{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
    <form action="/register" method="post">
        <div>
            <input autocomplete="off" autofocus name="username" placeholder="Enter new username" type="text">
        </div>
        <div>
            <input autocomplete="off" name="password" placeholder="Enter new password" type="password">
        </div>
        <div>
            <input autocomplete="off" name="confirmation" placeholder="Confirm new password" type="password">
        </div>
        <button class="btn" type="submit">Register</button>
    </form>
{% endblock %}
